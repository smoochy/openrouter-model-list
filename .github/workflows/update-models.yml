name: Update model lists

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: update-model-lists
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.SYNC_PAT }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install dependencies
        run: uv sync

      - name: Generate models-mengram.json
        run: uv run scripts/generate_models.py --profile mengram
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Generate models-yt-summarizer.json
        run: uv run scripts/generate_models.py --profile yt-summarizer
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Generate models-openwiki.json
        run: uv run scripts/generate_models.py --profile openwiki
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models-mengram.json models-yt-summarizer.json models-openwiki.json history/
          git diff --cached --quiet || git commit -m "Update model lists"
          git pull --rebase
          git push
